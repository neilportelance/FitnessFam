name: Generate Leaderboard

on:
  schedule:
    - cron: '0 6 * * *'  # runs daily at 6am UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests

      - name: Write config.json from secrets
        run: |
          echo '{
            "client_id": ${{ secrets.STRAVA_CLIENT_ID }},
            "client_secret": "${{ secrets.STRAVA_CLIENT_SECRET }}",
            "refresh_token": "${{ secrets.STRAVA_REFRESH_TOKEN }}",
            "club_id": ${{ secrets.STRAVA_CLUB_ID }}
          }' > config.json

      - name: Restore cache from previous run
        uses: actions/cache@v4
        with:
          path: cache.json
          key: strava-cache-${{ github.run_id }}
          restore-keys: |
            strava-cache-

      - name: Debug files
        run: |
          echo "=== anchor.json ==="
          cat anchor.json || echo "NOT FOUND"
          echo "=== directory listing ==="
          ls -la

      - name: Run leaderboard
        run: python run.py

      - name: Save updated refresh token back to secrets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TOKEN=$(python -c "import json; print(json.load(open('config.json'))['refresh_token'])")
          gh secret set STRAVA_REFRESH_TOKEN --body "$NEW_TOKEN"

      - name: Commit updated data files
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add alltime.json anchor.json || true
          git diff --staged --quiet || git commit -m "Update leaderboard data [skip ci]"
          git push || true

      - name: Deploy reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          keep_files: false
